{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Collabstr{% endblock %}</title>
  <meta name="description" content="{% block description %}Collabstr AI tools.{% endblock %}" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{% static 'brief/css/styles.css' %}" />
  {% block extra_head %}{% endblock %}
</head>
<body class="{% block body_class %}{% endblock %}">
  {% include "components/topbar.html" with tag=topbar_tag %}

  <main class="wrap page">
    {% block content %}{% endblock %}
    {% include "components/footer.html" with note=footer_note %}
  </main>

  {% block scripts %}{% endblock %}
</body>
</html>
