# One-click deploy on Render (https://render.com): New -> Blueprint -> pick this repo -> Apply.
# Docker runtime, free plan. Render will prompt for the `sync: false` secrets at apply time.
#
# Configured for a real OpenAI demo. For a keyless demo instead, set LLM_PROVIDER=fake
# (and drop the OPENAI_API_KEY requirement) in the dashboard.
services:
  - type: web
    name: collabstr-brief-generator
    runtime: docker
    plan: free
    autoDeploy: true
    envVars:
      - key: DJANGO_DEBUG
        value: "false"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      # Bound to this service's own onrender.com host — no wildcard.
      - key: DJANGO_ALLOWED_HOSTS
        fromService:
          type: web
          name: collabstr-brief-generator
          property: host
      # Set to your full URL after the first deploy, e.g.
      # https://collabstr-brief-generator.onrender.com
      - key: DJANGO_CSRF_TRUSTED_ORIGINS
        sync: false
      # One proxy hop in front of the app (Render's LB) — lets the app read the real
      # client IP from X-Forwarded-For for rate limiting without trusting spoofs.
      - key: TRUSTED_PROXY_COUNT
        value: "1"
      - key: LLM_PROVIDER
        value: "openai"
      - key: LLM_MODEL
        value: "gpt-5-mini"
      # Paste your key when Render prompts at apply (kept out of git).
      - key: OPENAI_API_KEY
        sync: false
